<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H3althier Living — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy-deep:   #060E24;
      --navy-dark:   #0D1B3E;
      --navy-mid:    #1B3A6B;
      --navy-light:  #2952A3;
      --teal:        #3DD9C4;
      --teal-dim:    rgba(61,217,196,0.15);
      --white:       #F0F4FF;
      --muted:       rgba(240,244,255,0.45);
      --card-bg:     rgba(27,58,107,0.35);
      --border:      rgba(61,217,196,0.2);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--navy-deep);
      color: var(--white);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(41,82,163,0.4) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(61,217,196,0.15) 0%, transparent 50%),
        radial-gradient(ellipse 100% 100% at 50% 50%, var(--navy-dark) 0%, var(--navy-deep) 100%);
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(61,217,196,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(61,217,196,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    .page {
      position: relative; z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .brand-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      animation: fadeSlideLeft 0.8s ease both;
    }

    .logo-mark {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--teal), var(--navy-light));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 800; font-size: 22px;
      color: var(--navy-deep);
      margin-bottom: 40px;
      box-shadow: 0 8px 32px rgba(61,217,196,0.3);
    }

    .brand-title {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(36px, 4vw, 56px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
    }

    .brand-title span { color: var(--teal); }

    .brand-subtitle {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 360px;
      margin-bottom: 48px;
    }

    .stats-row {
      display: flex; gap: 32px;
    }

    .stat {
      display: flex; flex-direction: column; gap: 4px;
    }

    .stat-num {
      font-family: 'Outfit', sans-serif;
      font-size: 28px; font-weight: 700;
      color: var(--teal);
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      animation: fadeSlideRight 0.8s 0.1s ease both;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(6,14,36,0.6);
    }

    .card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 26px; font-weight: 700;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      background: rgba(13,27,62,0.6);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(61,217,196,0.12);
    }

    .field input::placeholder { color: rgba(240,244,255,0.25); }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--teal), #2bc8b5);
      color: var(--navy-deep);
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-top: 8px;
      box-shadow: 0 4px 20px rgba(61,217,196,0.3);
    }

    .btn-primary:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(61,217,196,0.4);
    }

    .btn-primary:active { transform: translateY(0); }

    .divider {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin: 24px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute; top: 50%;
      width: 38%; height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .link-register {
      display: block;
      text-align: center;
      font-size: 14px;
      color: var(--teal);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .link-register:hover { opacity: 0.75; }

    .error-msg {
      background: rgba(255,80,80,0.12);
      border: 1px solid rgba(255,80,80,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #ff8080;
      margin-bottom: 20px;
      display: none;
    }

    @keyframes fadeSlideLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeSlideRight {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 768px) {
      .page { grid-template-columns: 1fr; }
      .brand-panel { display: none; }
      .form-panel { padding: 24px; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="brand-panel">
    <div class="logo-mark">H3</div>
    <h1 class="brand-title">
      Viva de forma<br/><span>mais saudável.</span>
    </h1>
    <p class="brand-subtitle">
      H3althier Living acompanha sua rotina diária, registra suas atividades
      e te ajuda a construir hábitos duradouros.
    </p>
    <div class="stats-row">
      <div class="stat">
        <span class="stat-num">∞</span>
        <span class="stat-label">Tarefas</span>
      </div>
      <div class="stat">
        <span class="stat-num">24h</span>
        <span class="stat-label">Monitorado</span>
      </div>
      <div class="stat">
        <span class="stat-num">100%</span>
        <span class="stat-label">Seu ritmo</span>
      </div>
    </div>
  </div>

  <div class="form-panel">
    <div class="card">
      <h2 class="card-title">Bem-vindo de volta</h2>
      <p class="card-sub">Acesse sua conta para continuar.</p>

      <div class="error-msg" id="errorMsg">E-mail ou senha incorretos.</div>

      <div class="field">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" />
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <button class="btn-primary" onclick="handleLogin()">Entrar</button>

      <div class="divider">ou</div>
      <a href="register.html" class="link-register">Criar nova conta</a>
    </div>
  </div>

</div>

<script>
  const API = 'http://localhost:8080';

  async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.style.display = 'none';

    if (!email || !password) {
      errorMsg.textContent = 'Preencha e-mail e senha.';
      errorMsg.style.display = 'block';
      return;
    }

    try {
      const res   = await fetch(`${API}/users`);
      const users = await res.json();
      const match = users.find(u => u.email === email && u.password === password);

      if (match) {
        sessionStorage.setItem('currentUser', JSON.stringify(match));
        window.location.href = 'dashboard.html';
      } else {
        errorMsg.textContent = 'E-mail ou senha incorretos.';
        errorMsg.style.display = 'block';
      }
    } catch (e) {
      errorMsg.textContent = 'Não foi possível conectar à API. A aplicação Spring está rodando?';
      errorMsg.style.display = 'block';
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
