<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H3althier Living — Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy-deep:   #060E24;
      --navy-dark:   #0D1B3E;
      --navy-mid:    #1B3A6B;
      --navy-light:  #2952A3;
      --teal:        #3DD9C4;
      --white:       #F0F4FF;
      --muted:       rgba(240,244,255,0.45);
      --card-bg:     rgba(27,58,107,0.35);
      --border:      rgba(61,217,196,0.2);
    }

    html, body {
      min-height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--navy-deep);
      color: var(--white);
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 80% 20%, rgba(41,82,163,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 80% 80% at 10% 80%, rgba(61,217,196,0.1) 0%, transparent 50%),
        var(--navy-dark);
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(61,217,196,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(61,217,196,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 12px;
      padding: 20px 40px;
      z-index: 10;
    }

    .logo-mark {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--teal), var(--navy-light));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 800; font-size: 15px;
      color: var(--navy-deep);
    }

    .logo-name {
      font-family: 'Outfit', sans-serif;
      font-weight: 700; font-size: 16px;
    }

    .logo-name span { color: var(--teal); }

    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(6,14,36,0.6);
      animation: fadeUp 0.7s ease both;
    }

    .card-header { margin-bottom: 36px; }

    .card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 28px; font-weight: 700;
      margin-bottom: 6px;
    }

    .card-sub { font-size: 14px; color: var(--muted); }

    .section-label {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--teal);
      margin: 28px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .field input, .field select {
      width: 100%;
      background: rgba(13,27,62,0.7);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
    }

    .field select option { background: var(--navy-dark); }

    .field input:focus, .field select:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(61,217,196,0.1);
    }

    .field input::placeholder { color: rgba(240,244,255,0.2); }

    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--teal), #2bc8b5);
      color: var(--navy-deep);
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-top: 24px;
      box-shadow: 0 4px 20px rgba(61,217,196,0.3);
    }

    .btn-primary:hover {
      opacity: 0.92; transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(61,217,196,0.4);
    }

    .link-login {
      display: block; text-align: center;
      font-size: 14px; color: var(--muted);
      text-decoration: none; margin-top: 20px;
      transition: color 0.2s;
    }

    .link-login:hover { color: var(--teal); }
    .link-login span { color: var(--teal); }

    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--teal); color: var(--navy-deep);
      font-family: 'Outfit', sans-serif; font-weight: 600;
      padding: 14px 28px; border-radius: 40px;
      box-shadow: 0 8px 32px rgba(61,217,196,0.4);
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
      z-index: 100; white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    .error-msg {
      background: rgba(255,80,80,0.12);
      border: 1px solid rgba(255,80,80,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px; color: #ff8080;
      margin-bottom: 12px;
      display: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="top-bar">
  <div class="logo-mark">H3</div>
  <span class="logo-name">H3althier <span>Living</span></span>
</div>

<div class="page">
  <div class="card">
    <div class="card-header">
      <h2 class="card-title">Criar conta</h2>
      <p class="card-sub">Preencha seus dados para começar sua jornada saudável.</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="section-label">Dados pessoais</div>
    <div class="field">
      <label>Nome completo *</label>
      <input type="text" id="name" placeholder="Seu nome" />
    </div>
    <div class="grid-2">
      <div class="field">
        <label>E-mail *</label>
        <input type="email" id="email" placeholder="seu@email.com" />
      </div>
      <div class="field">
        <label>Senha *</label>
        <input type="password" id="password" placeholder="Mín. 6 caracteres" />
        <div class="hint">Mínimo de 6 caracteres</div>
      </div>
    </div>
    <div class="grid-2">
      <div class="field">
        <label>Idade *</label>
        <input type="number" id="age" placeholder="Ex: 21" min="13" />
      </div>
      <div class="field">
        <label>Gênero</label>
        <select id="gender">
          <option value="">Prefiro não dizer</option>
          <option value="Masculino">Masculino</option>
          <option value="Feminino">Feminino</option>
          <option value="Não-binário">Não-binário</option>
          <option value="Outro">Outro</option>
        </select>
      </div>
    </div>

    <div class="section-label">Dados de saúde</div>
    <div class="grid-2">
      <div class="field">
        <label>Peso (kg)</label>
        <input type="number" id="weight" placeholder="Ex: 70.5" step="0.1" />
      </div>
      <div class="field">
        <label>Altura (m)</label>
        <input type="number" id="height" placeholder="Ex: 1.75" step="0.01" />
      </div>
    </div>
    <div class="field">
      <label>Meta diária de passos</label>
      <input type="number" id="dailyStepGoal" placeholder="Ex: 10000" />
      <div class="hint">Recomendado: 8.000 a 10.000 passos/dia</div>
    </div>

    <button class="btn-primary" onclick="handleRegister()">Criar minha conta</button>
    <a href="index.html" class="link-login">Já tenho conta — <span>Fazer login</span></a>
  </div>
</div>

<div class="toast" id="toast">✓ Conta criada! Redirecionando...</div>

<script>
  const API = 'http://localhost:8080';

  async function handleRegister() {
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.style.display = 'none';

    const name         = document.getElementById('name').value.trim();
    const email        = document.getElementById('email').value.trim();
    const password     = document.getElementById('password').value;
    const age          = parseInt(document.getElementById('age').value);
    const gender       = document.getElementById('gender').value || null;
    const weight       = parseFloat(document.getElementById('weight').value) || null;
    const height       = parseFloat(document.getElementById('height').value) || null;
    const dailyStepGoal = parseInt(document.getElementById('dailyStepGoal').value) || null;

    if (!name || !email || !password || !age) {
      errorMsg.textContent = 'Preencha todos os campos obrigatórios (*)';
      errorMsg.style.display = 'block';
      return;
    }

    const payload = { name, email, password, age, gender, weight, height, dailyStepGoal };

    try {
      const res = await fetch(`${API}/users`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        const user = await res.json();
        sessionStorage.setItem('currentUser', JSON.stringify(user));
        document.getElementById('toast').classList.add('show');
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
      } else {
        const err = await res.json();
        errorMsg.textContent = err.erro || 'Erro ao criar conta. Verifique os dados.';
        errorMsg.style.display = 'block';
      }
    } catch (e) {
      errorMsg.textContent = 'Não foi possível conectar à API. A aplicação Spring está rodando?';
      errorMsg.style.display = 'block';
    }
  }
</script>
</body>
</html>
